# ─────────────────────────────────────────────────────────────────────────────
# NexusSec Cybersecurity Platform — GitLab CI/CD
# Pipeline: lint → test → sonar-analysis → build-image → deploy
# ─────────────────────────────────────────────────────────────────────────────

default:
  image: python:3.12-slim
  before_script:
    - pip install --quiet --upgrade pip
    - pip install --quiet -r requirements.txt

stages:
  - lint
  - test
  - analyze
  - build
  - deploy

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1 — Lint
# ─────────────────────────────────────────────────────────────────────────────
lint:
  stage: lint
  script:
    - pip install --quiet ruff
    - ruff check cybersec_platform/ tests/
  allow_failure: false

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2 — Tests  (split into fast unit tests + full holdout accuracy)
# ─────────────────────────────────────────────────────────────────────────────
unit-tests:
  stage: test
  script:
    - pip install --quiet pytest pytest-cov
    - pytest tests/test_parsing.py tests/test_feature_engineering.py
        --tb=short -q
  artifacts:
    when: always
    reports:
      junit: junit-unit.xml
    paths:
      - junit-unit.xml
    expire_in: 7 days

isp-accuracy-tests:
  stage: test
  script:
    - pip install --quiet pytest pytest-cov
    - pytest tests/test_isp_accuracy.py
        --tb=short -q --junitxml=junit-isp.xml
  artifacts:
    when: always
    reports:
      junit: junit-isp.xml
    paths:
      - junit-isp.xml
    expire_in: 7 days

synthetic-holdout-tests:
  stage: test
  script:
    - pip install --quiet pytest pytest-cov
    - pytest tests/test_synthetic_holdout.py
        --tb=short -q --junitxml=junit-holdout.xml
  artifacts:
    when: always
    reports:
      junit: junit-holdout.xml
    paths:
      - junit-holdout.xml
    expire_in: 7 days

coverage:
  stage: test
  script:
    - pip install --quiet pytest pytest-cov
    - pytest tests/
        --cov=cybersec_platform
        --cov-report=term-missing
        --cov-report=xml:coverage.xml
        --junitxml=junit-all.xml
        -q
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    when: always
    reports:
      junit: junit-all.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
      - junit-all.xml
    expire_in: 14 days

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 3 — Sonar-like static analysis  (mirrors existing GitHub Action)
# ─────────────────────────────────────────────────────────────────────────────
sonar-analysis:
  stage: analyze
  script:
    - python - <<'PY'
import os
from cybersec_platform.sonar_analyzer import SonarAnalyzer

analyzer = SonarAnalyzer()
base = os.getcwd()
extensions = {'.py', '.js', '.ts', '.java', '.html', '.css'}
exclude_files = {'sonar_analyzer.py'}
results = []

for root, _, files in os.walk(base):
    if '.git' in root or '__pycache__' in root or root.startswith(os.path.join(base, '.gitlab')):
        continue
    for name in files:
        if name in exclude_files:
            continue
        if os.path.splitext(name)[1].lower() in extensions:
            path = os.path.join(root, name)
            with open(path, 'r', encoding='utf-8', errors='replace') as f:
                content = f.read()
            report = analyzer.analyze_code(name, content)
            if report['summary']['bugs'] or report['summary']['vulnerabilities'] or report['summary']['maintainability_issues']:
                results.append((path, report))

if not results:
    print('✅ No issues found by Sonar-like analysis.')
    raise SystemExit(0)

print('Sonar-like issues detected:')
for path, report in results:
    print(f'\nFile: {path}')
    print(f"Bugs: {report['summary']['bugs']}, Vulnerabilities: {report['summary']['vulnerabilities']}, Maintainability: {report['summary']['maintainability_issues']}")
    for issue in report['issues']:
        print(f"  - [{issue['category']}] {issue['severity']} at line {issue['line']}: {issue['description']}")

critical = any(issue['severity'] == 'Critical' for _, report in results for issue in report['issues'])
if critical:
    print('\n❌ Critical issues found. Failing pipeline.')
    raise SystemExit(1)
PY
  allow_failure: false

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 4 — Build Docker image  (only on main / tags)
# ─────────────────────────────────────────────────────────────────────────────
build-image:
  stage: build
  image: docker:26
  services:
    - docker:26-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    # Override in GitLab CI/CD → Variables:
    #   CI_REGISTRY_IMAGE  (auto-set by GitLab for the project registry)
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      TAG="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
      docker build -t "$CI_REGISTRY_IMAGE:$TAG" -t "$CI_REGISTRY_IMAGE:latest" .
      docker push "$CI_REGISTRY_IMAGE:$TAG"
      docker push "$CI_REGISTRY_IMAGE:latest"
  only:
    - main
    - tags

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 5 — Deploy
#
# Two jobs — pick the one that matches your hosting approach:
#   a) deploy-vercel  : push to Vercel (matches pyproject.toml entrypoint)
#   b) deploy-ssh     : SSH into a remote server and restart the container
#
# Set the required CI/CD Variables in GitLab:
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID  (for Vercel)
#   SSH_PRIVATE_KEY, DEPLOY_HOST, DEPLOY_USER        (for SSH / VPS)
# ─────────────────────────────────────────────────────────────────────────────

# ── Option A: Vercel ──────────────────────────────────────────────────────────
deploy-vercel:
  stage: deploy
  image: node:20-slim
  before_script: []          # skip Python before_script for this job
  script:
    - npm install --global vercel@latest --quiet
    - vercel pull  --yes --environment=production --token="$VERCEL_TOKEN"
    - vercel build --prod              --token="$VERCEL_TOKEN"
    - vercel deploy --prebuilt --prod  --token="$VERCEL_TOKEN"
  environment:
    name: production
    url: $VERCEL_DEPLOY_URL     # set this variable to your Vercel project URL
  only:
    - main
    - tags
  when: manual                  # change to `on_success` for automatic deploys

# ── Option B: SSH / container host ───────────────────────────────────────────
deploy-ssh:
  stage: deploy
  image: alpine:3.19
  before_script: []             # skip Python before_script for this job
  script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
    - |
      ssh "$DEPLOY_USER@$DEPLOY_HOST" "
        docker login -u '$CI_REGISTRY_USER' -p '$CI_REGISTRY_PASSWORD' '$CI_REGISTRY' &&
        docker pull '$CI_REGISTRY_IMAGE:latest' &&
        docker stop nexussec 2>/dev/null || true &&
        docker rm   nexussec 2>/dev/null || true &&
        docker run -d \
          --name nexussec \
          --restart unless-stopped \
          -p 5000:5000 \
          -e FLASK_DEBUG=0 \
          '$CI_REGISTRY_IMAGE:latest'
      "
  environment:
    name: production
    url: http://$DEPLOY_HOST:5000
  only:
    - main
    - tags
  when: manual                  # change to `on_success` for automatic deploys

# ─────────────────────────────────────────────────────────────────────────────
# Mirror pipeline results to the GitHub repository
# Requires CI/CD Variable: GITHUB_TOKEN (PAT with repo scope)
# Set: GITHUB_REPO = "owner/repo-name"
# ─────────────────────────────────────────────────────────────────────────────
mirror-to-github:
  stage: deploy
  image: alpine/git:2.43.0
  before_script: []
  script:
    - git remote add github "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git"
    - git push github HEAD:main --force
  only:
    - main
  when: on_success
  needs:
    - deploy-vercel   # runs after deploy; remove if using deploy-ssh instead
